services:
  - type: web
    name: wallet-intelligence-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: BSCSCAN_API_KEY
        sync: false
